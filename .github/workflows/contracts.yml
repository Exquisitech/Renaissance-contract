name: Contracts CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  cargo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        run: cargo check --all
      - name: Check contract WASM targets
        run: |
          cargo check -p renaissance-counter --target wasm32v1-none --release
          cargo check -p renaissance-betting --target wasm32v1-none --release
          cargo check -p renaissance-rewards --target wasm32v1-none --release
          cargo check -p renaissance-player-nft --target wasm32v1-none --release
          cargo check -p renaissance-oracle --target wasm32v1-none --release
          cargo check -p renaissance-vault --target wasm32v1-none --release
      - name: Gas budget benchmarks
        # Runs the cpu/memory budget assertions in `counter` and `betting`'s
        # `gas_bench` test modules (see docs/gas-benchmarks.md). Fails the
        # build if any benchmarked function exceeds its configured budget.
        # Scoped to these two crates rather than `--all` so this step tracks
        # exactly the functions this benchmark suite covers; the other
        # contract crates have their own pre-existing test suites that are
        # out of scope for this gate.
        run: |
          cargo test --release -p renaissance-counter gas_bench
          cargo test --release -p renaissance-betting gas_bench